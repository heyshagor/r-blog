<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shadow Scroll — Blog</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root{
  --void:#060608;
  --shadow:#0e0e16;
  --dark:#13131e;
  --blood:#c0392b;
  --fire:#e67e22;
  --ember:#f39c12;
  --gold:#d4a843;
  --text:#e8d5b0;
  --text2:#b0a090;
  --muted:#6a5a4a;
  --dim:#2a2018;
  --success:#27ae60;
  --border:rgba(192,57,43,0.2);
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  font-family:'Rajdhani',sans-serif;
  background:var(--void);
  color:var(--text);
  min-height:100vh;
  cursor:default;
}

/* ── BG ── */
body::before{
  content:'';position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(ellipse 60% 40% at 50% 100%,#c0392b12,transparent 65%),
    radial-gradient(ellipse 30% 50% at 5% 50%,#e67e2208,transparent 55%),
    radial-gradient(ellipse 25% 35% at 95% 20%,#c0392b08,transparent 50%);
  pointer-events:none;
}
body::after{
  content:'';position:fixed;inset:0;z-index:0;
  background-image:linear-gradient(rgba(192,57,43,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(192,57,43,0.04) 1px,transparent 1px);
  background-size:55px 55px;
  mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black,transparent);
  pointer-events:none;
}
.scanlines{position:fixed;inset:0;z-index:999;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.05) 3px,rgba(0,0,0,0.05) 4px);}

/* ── PARTICLES ── */
.particles{position:fixed;inset:0;z-index:1;pointer-events:none;}
.particle{position:absolute;border-radius:50%;animation:floatUp var(--dur,8s) ease-in infinite;animation-delay:var(--del,0s);opacity:0;}
@keyframes floatUp{
  0%{transform:translateY(100vh) translateX(0);opacity:0;}
  10%{opacity:0.6;}90%{opacity:0.15;}
  100%{transform:translateY(-80px) translateX(var(--dx,20px));opacity:0;}
}

/* ── NAV ── */
nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  display:flex;align-items:center;padding:0 2rem;height:58px;
  background:rgba(6,6,8,0.92);
  border-bottom:1px solid var(--border);
  backdrop-filter:blur(12px);
}
nav::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--blood),var(--gold),var(--blood),transparent);}
.nav-logo{
  font-family:'Cinzel Decorative',serif;font-size:0.9rem;font-weight:900;
  background:linear-gradient(135deg,#e8d5b0,#f39c12,#c0392b);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  display:flex;align-items:center;gap:0.5rem;text-decoration:none;
}
.nav-logo .s{animation:sg 3s ease-in-out infinite;}
@keyframes sg{0%,100%{filter:drop-shadow(0 0 4px #c0392b88);}50%{filter:drop-shadow(0 0 14px #c0392bcc);}}
.nav-sep{flex:1;}
.nav-links{display:flex;gap:1.5rem;align-items:center;}
.nav-links a{
  font-family:'Share Tech Mono',monospace;font-size:0.65rem;letter-spacing:0.2em;
  color:var(--muted);text-decoration:none;text-transform:uppercase;
  transition:color 0.2s;
}
.nav-links a:hover,.nav-links a.active{color:var(--text);}
.nav-links a.active{color:var(--blood);}

/* ── HERO ── */
.hero{
  position:relative;z-index:2;
  padding:130px 2rem 60px;
  text-align:center;
  max-width:700px;margin:0 auto;
}
.hero-eyebrow{
  font-family:'Share Tech Mono',monospace;font-size:0.65rem;letter-spacing:0.4em;
  color:var(--blood);text-transform:uppercase;margin-bottom:1rem;
  display:flex;align-items:center;justify-content:center;gap:1rem;
}
.hero-eyebrow::before,.hero-eyebrow::after{content:'';width:40px;height:1px;background:var(--blood)66;}
.hero-title{
  font-family:'Cinzel Decorative',serif;font-size:clamp(2rem,6vw,3.5rem);font-weight:900;
  background:linear-gradient(135deg,#e8d5b0 0%,#f39c12 40%,#c0392b 80%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  line-height:1.15;margin-bottom:1rem;
  filter:drop-shadow(0 0 40px #c0392b33);
}
.hero-sub{font-size:1rem;font-weight:400;color:var(--text2);line-height:1.7;max-width:460px;margin:0 auto;}

/* ── DIVIDER ── */
.divider{
  position:relative;z-index:2;
  display:flex;align-items:center;gap:1rem;
  max-width:860px;margin:0 auto 2.5rem;padding:0 2rem;
}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--blood)44,transparent);}
.divider span{font-family:'Share Tech Mono',monospace;font-size:0.6rem;color:var(--blood);letter-spacing:0.25em;white-space:nowrap;}

/* ── FILTER BAR ── */
.filter-bar{
  position:relative;z-index:2;
  display:flex;align-items:center;gap:0.8rem;
  max-width:860px;margin:0 auto 2rem;padding:0 2rem;
}
.filter-count{font-family:'Share Tech Mono',monospace;font-size:0.65rem;color:var(--muted);letter-spacing:0.15em;margin-left:auto;}

/* ── POST GRID ── */
.posts-grid{
  position:relative;z-index:2;
  max-width:860px;margin:0 auto;
  padding:0 2rem 5rem;
  display:grid;gap:1.2rem;
}

/* ── POST CARD ── */
.post-card{
  background:rgba(18,18,28,0.85);
  border:1px solid var(--border);
  border-radius:2px;
  padding:1.8rem 2rem;
  cursor:pointer;
  position:relative;
  overflow:hidden;
  transition:all 0.3s cubic-bezier(0.16,1,0.3,1);
  text-decoration:none;
  display:block;
  animation:cardIn 0.5s cubic-bezier(0.16,1,0.3,1) both;
  animation-delay:var(--delay,0s);
}
@keyframes cardIn{
  from{opacity:0;transform:translateY(20px);}
  to{opacity:1;transform:translateY(0);}
}
.post-card::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:2px;
  background:linear-gradient(180deg,transparent,var(--blood),transparent);
  opacity:0;transition:opacity 0.3s;
}
.post-card::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(192,57,43,0.04),transparent 60%);
  opacity:0;transition:opacity 0.3s;
}
.post-card:hover{
  border-color:rgba(192,57,43,0.45);
  transform:translateX(4px);
  box-shadow:0 4px 30px rgba(0,0,0,0.5),-4px 0 20px rgba(192,57,43,0.1);
}
.post-card:hover::before{opacity:1;}
.post-card:hover::after{opacity:1;}

.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;margin-bottom:0.7rem;}
.card-title{
  font-family:'Cinzel Decorative',serif;font-size:1rem;font-weight:700;
  color:var(--text);line-height:1.35;flex:1;
  transition:color 0.2s;
}
.post-card:hover .card-title{color:#f5e6c8;}
.card-arrow{
  font-size:1rem;color:var(--blood);opacity:0;
  transform:translateX(-8px);transition:all 0.3s;flex-shrink:0;margin-top:2px;
}
.post-card:hover .card-arrow{opacity:1;transform:translateX(0);}

.card-excerpt{
  font-size:0.9rem;font-weight:400;color:var(--text2);line-height:1.65;
  margin-bottom:1.2rem;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}

.card-footer{display:flex;align-items:center;gap:1rem;}
.card-date{font-family:'Share Tech Mono',monospace;font-size:0.6rem;color:var(--muted);letter-spacing:0.15em;}
.card-badge{
  font-family:'Share Tech Mono',monospace;font-size:0.55rem;letter-spacing:0.12em;
  padding:0.15rem 0.5rem;border-radius:1px;
  background:rgba(192,57,43,0.12);color:var(--blood);border:1px solid rgba(192,57,43,0.25);
}
.card-read{
  margin-left:auto;font-family:'Share Tech Mono',monospace;font-size:0.6rem;
  color:var(--muted);letter-spacing:0.15em;transition:color 0.2s;
}
.post-card:hover .card-read{color:var(--blood);}

/* ── LOADING STATE ── */
.loading-state{
  position:relative;z-index:2;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:1rem;padding:5rem 2rem;
}
.loading-sword{
  font-size:2.5rem;
  animation:swordSpin 2s ease-in-out infinite;
  filter:drop-shadow(0 0 20px #c0392b88);
}
@keyframes swordSpin{0%,100%{transform:rotate(-10deg);}50%{transform:rotate(10deg);}}
.loading-text{font-family:'Share Tech Mono',monospace;font-size:0.7rem;color:var(--muted);letter-spacing:0.3em;}
.loading-dots span{animation:ld 1.2s ease-in-out infinite;animation-delay:calc(var(--i)*0.2s);}
@keyframes ld{0%,100%{opacity:0.2;}50%{opacity:1;}}

/* ── EMPTY STATE ── */
.empty-state{
  position:relative;z-index:2;
  text-align:center;padding:5rem 2rem;
  font-family:'Share Tech Mono',monospace;
}
.empty-state .e-icon{font-size:3rem;opacity:0.3;display:block;margin-bottom:1rem;}
.empty-state p{font-size:0.7rem;color:var(--muted);letter-spacing:0.2em;line-height:2;}

/* ── FLAMES ── */
.flames-bottom{position:fixed;bottom:0;left:0;right:0;height:80px;z-index:5;pointer-events:none;overflow:hidden;}
.flame{position:absolute;bottom:0;border-radius:50% 50% 30% 30%;animation:flameUp var(--fd,2s) ease-out infinite;animation-delay:var(--fdel,0s);opacity:0;}
@keyframes flameUp{0%{height:0;opacity:0;}15%{opacity:0.7;}100%{height:70px;opacity:0;}}

/* ── FOOTER ── */
footer{
  position:relative;z-index:2;
  text-align:center;padding:2rem;
  border-top:1px solid var(--border);
  font-family:'Share Tech Mono',monospace;font-size:0.6rem;
  color:var(--muted);letter-spacing:0.2em;
}
footer a{color:var(--blood);text-decoration:none;}
footer a:hover{color:var(--fire);}
</style>
</head>
<body>
<div class="scanlines"></div>
<div class="particles" id="particles"></div>
<div class="flames-bottom" id="flames"></div>

<nav>
  <a href="/" class="nav-logo"><span class="s">⚔</span> Shagor</a>
  <div class="nav-sep"></div>
  <div class="nav-links">
    <a href="/">Home</a>
    <a href="/blog/" class="active">Blog</a>
    <a href="/#projects">Projects</a>
    <a href="/#contact">Contact</a>
  </div>
</nav>

<section class="hero">
  <div class="hero-eyebrow">⚔ Shadow Scrolls ⚔</div>
  <h1 class="hero-title">Chronicles of<br>the Shadow Realm</h1>
  <p class="hero-sub">Writings on networking, Python, Linux, and the path of the engineer warrior.</p>
</section>

<div class="divider"><span>— Latest Scrolls —</span></div>

<div class="filter-bar">
  <span class="filter-count" id="post-count"></span>
</div>

<div class="posts-grid" id="posts-grid">
  <div class="loading-state">
    <div class="loading-sword">⚔</div>
    <div class="loading-text">SUMMONING SCROLLS<span class="loading-dots"><span style="--i:0">.</span><span style="--i:1">.</span><span style="--i:2">.</span></span></div>
  </div>
</div>

<footer>
  <p>⚔ SHADOW SCROLL · <a href="https://heyshagor.github.io">heyshagor.github.io</a> · BUILT WITH BLOOD & CODE</p>
</footer>

<script>
const API = "https://blog-api-982x.onrender.com";

// Particles
const pc = document.getElementById('particles');
for(let i=0;i<35;i++){
  const p=document.createElement('div');p.className='particle';
  p.style.left=Math.random()*100+'%';
  p.style.setProperty('--dur',(7+Math.random()*10)+'s');
  p.style.setProperty('--del',(Math.random()*12)+'s');
  p.style.setProperty('--dx',((Math.random()-0.5)*50)+'px');
  const sz=1+Math.random()*2;p.style.width=sz+'px';p.style.height=sz+'px';
  p.style.background=Math.random()>0.6?'#c0392b':'#f39c12';
  pc.appendChild(p);
}

// Flames
const fc=document.getElementById('flames');
for(let i=0;i<22;i++){
  const f=document.createElement('div');f.className='flame';
  f.style.left=Math.random()*100+'%';
  f.style.setProperty('--fd',(1.5+Math.random()*2.5)+'s');
  f.style.setProperty('--fdel',(Math.random()*4)+'s');
  const w=3+Math.random()*10;f.style.width=w+'px';
  f.style.background=Math.random()>0.5
    ?'linear-gradient(180deg,transparent,#c0392b,#e67e22)'
    :'linear-gradient(180deg,transparent,#e67e22,#f39c12)';
  fc.appendChild(f);
}

function fmtDate(d){
  return new Date(d).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
}
function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

async function loadPosts(){
  const grid=document.getElementById('posts-grid');
  try{
    const r=await fetch(`${API}/posts`);
    const posts=await r.json();
    document.getElementById('post-count').textContent=posts.length+' SCROLL'+(posts.length!==1?'S':'');

    if(!posts.length){
      grid.innerHTML=`<div class="empty-state"><span class="e-icon">📜</span><p>NO SCROLLS YET.<br>THE WARRIOR IS STILL WRITING.</p></div>`;
      return;
    }

    grid.innerHTML=posts.map((p,i)=>`
      <a class="post-card" href="/blog/post.html?slug=${encodeURIComponent(p.slug)}" style="--delay:${i*0.08}s">
        <div class="card-top">
          <div class="card-title">${escHtml(p.title)}</div>
          <div class="card-arrow">→</div>
        </div>
        ${p.excerpt?`<div class="card-excerpt">${escHtml(p.excerpt)}</div>`:''}
        <div class="card-footer">
          <span class="card-date">${fmtDate(p.created_at)}</span>
          <span class="card-badge">SCROLL</span>
          <span class="card-read">READ →</span>
        </div>
      </a>
    `).join('');
  } catch(e){
    grid.innerHTML=`<div class="empty-state"><span class="e-icon">⚠</span><p>FAILED TO SUMMON SCROLLS.<br>THE API MAY BE SLEEPING.<br><small style="opacity:0.5">${e.message}</small></p></div>`;
  }
}

loadPosts();
</script>
</body>
</html>
