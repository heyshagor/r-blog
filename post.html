<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shadow Scroll — Post</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<!-- Marked.js for Markdown rendering -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<style>
:root{
  --void:#060608;
  --shadow:#0e0e16;
  --blood:#c0392b;
  --fire:#e67e22;
  --ember:#f39c12;
  --gold:#d4a843;
  --text:#e8d5b0;
  --text2:#b0a090;
  --muted:#6a5a4a;
  --dim:#2a2018;
  --border:rgba(192,57,43,0.2);
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  font-family:'Rajdhani',sans-serif;
  background:var(--void);color:var(--text);
  min-height:100vh;
}
body::before{
  content:'';position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(ellipse 50% 40% at 50% 0%,#c0392b0e,transparent 60%),
    radial-gradient(ellipse 40% 50% at 100% 80%,#c0392b08,transparent 55%);
  pointer-events:none;
}
body::after{
  content:'';position:fixed;inset:0;z-index:0;
  background-image:linear-gradient(rgba(192,57,43,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(192,57,43,0.03) 1px,transparent 1px);
  background-size:55px 55px;
  mask-image:radial-gradient(ellipse 70% 70% at 50% 50%,black,transparent);
  pointer-events:none;
}
.scanlines{position:fixed;inset:0;z-index:999;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.05) 3px,rgba(0,0,0,0.05) 4px);}

/* ── PARTICLES ── */
.particles{position:fixed;inset:0;z-index:1;pointer-events:none;}
.particle{position:absolute;border-radius:50%;animation:floatUp var(--dur,8s) ease-in infinite;animation-delay:var(--del,0s);opacity:0;}
@keyframes floatUp{
  0%{transform:translateY(100vh) translateX(0);opacity:0;}
  10%{opacity:0.5;}90%{opacity:0.1;}
  100%{transform:translateY(-80px) translateX(var(--dx,20px));opacity:0;}
}

/* ── NAV ── */
nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  display:flex;align-items:center;padding:0 2rem;height:58px;
  background:rgba(6,6,8,0.92);border-bottom:1px solid var(--border);
  backdrop-filter:blur(12px);
}
nav::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--blood),var(--gold),var(--blood),transparent);}
.nav-logo{
  font-family:'Cinzel Decorative',serif;font-size:0.9rem;font-weight:900;
  background:linear-gradient(135deg,#e8d5b0,#f39c12,#c0392b);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  text-decoration:none;display:flex;align-items:center;gap:0.5rem;
}
.nav-back{
  margin-left:1.5rem;font-family:'Share Tech Mono',monospace;font-size:0.6rem;
  letter-spacing:0.2em;color:var(--muted);text-decoration:none;
  display:flex;align-items:center;gap:0.4rem;transition:color 0.2s;
}
.nav-back:hover{color:var(--blood);}
.nav-sep{flex:1;}
.nav-links{display:flex;gap:1.5rem;}
.nav-links a{font-family:'Share Tech Mono',monospace;font-size:0.65rem;letter-spacing:0.2em;color:var(--muted);text-decoration:none;transition:color 0.2s;}
.nav-links a:hover{color:var(--text);}

/* ── ARTICLE WRAP ── */
.article-wrap{
  position:relative;z-index:2;
  max-width:720px;margin:0 auto;
  padding:100px 2rem 6rem;
}

/* ── POST HEADER ── */
.post-header{
  margin-bottom:3rem;
  animation:fadeUp 0.6s cubic-bezier(0.16,1,0.3,1) both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}

.post-eyebrow{
  display:flex;align-items:center;gap:0.8rem;margin-bottom:1.2rem;
}
.post-eyebrow::before{content:'⚔';font-size:0.8rem;color:var(--blood);filter:drop-shadow(0 0 6px #c0392b88);}
.post-date{font-family:'Share Tech Mono',monospace;font-size:0.62rem;color:var(--muted);letter-spacing:0.2em;}
.post-badge{font-family:'Share Tech Mono',monospace;font-size:0.55rem;letter-spacing:0.12em;padding:0.15rem 0.5rem;border-radius:1px;background:rgba(192,57,43,0.12);color:var(--blood);border:1px solid rgba(192,57,43,0.25);}

.post-title{
  font-family:'Cinzel Decorative',serif;
  font-size:clamp(1.5rem,5vw,2.4rem);
  font-weight:900;line-height:1.2;
  background:linear-gradient(135deg,#e8d5b0 0%,#f39c12 50%,#c0392b 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:1.2rem;
}

.post-excerpt{
  font-size:1.05rem;font-weight:400;color:var(--text2);line-height:1.7;
  padding-left:1rem;border-left:2px solid var(--blood)44;
  margin-bottom:1.5rem;
}

.post-meta-bar{
  display:flex;align-items:center;gap:1rem;
  padding:0.8rem 0;
  border-top:1px solid var(--border);border-bottom:1px solid var(--border);
}
.meta-item{font-family:'Share Tech Mono',monospace;font-size:0.6rem;color:var(--muted);letter-spacing:0.15em;}
.meta-item span{color:var(--text2);}

/* ── CONTENT ── */
.post-content{
  margin-top:2.5rem;
  animation:fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) 0.15s both;
}

/* Markdown styles */
.post-content h1,.post-content h2,.post-content h3,.post-content h4{
  font-family:'Cinzel Decorative',serif;font-weight:700;
  background:linear-gradient(135deg,#e8d5b0,#f39c12);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin:2rem 0 0.8rem;line-height:1.3;
}
.post-content h1{font-size:1.6rem;}
.post-content h2{font-size:1.3rem;}
.post-content h3{font-size:1.1rem;}
.post-content p{font-size:1rem;line-height:1.85;color:var(--text2);margin-bottom:1.2rem;font-weight:400;}
.post-content strong{color:var(--text);font-weight:700;}
.post-content em{color:var(--ember);font-style:italic;}
.post-content a{color:var(--blood);text-decoration:none;border-bottom:1px solid var(--blood)44;transition:all 0.2s;}
.post-content a:hover{color:var(--fire);border-bottom-color:var(--fire);}
.post-content ul,.post-content ol{padding-left:1.5rem;margin-bottom:1.2rem;}
.post-content li{font-size:1rem;line-height:1.8;color:var(--text2);margin-bottom:0.3rem;}
.post-content li::marker{color:var(--blood);}
.post-content blockquote{
  border-left:2px solid var(--blood);
  padding:0.8rem 1.2rem;margin:1.5rem 0;
  background:rgba(192,57,43,0.06);border-radius:0 2px 2px 0;
}
.post-content blockquote p{color:var(--text);font-style:italic;margin:0;}
.post-content code{
  font-family:'Share Tech Mono',monospace;font-size:0.82rem;
  background:rgba(192,57,43,0.1);color:#e8b4b0;
  padding:0.15rem 0.4rem;border-radius:2px;border:1px solid rgba(192,57,43,0.2);
}
.post-content pre{
  background:rgba(0,0,0,0.6);border:1px solid var(--border);border-radius:2px;
  padding:1.2rem;margin:1.5rem 0;overflow-x:auto;
  border-left:2px solid var(--blood);
}
.post-content pre code{
  background:none;border:none;padding:0;color:#7fdbca;
  font-size:0.82rem;line-height:1.7;
}
.post-content pre::-webkit-scrollbar{height:3px;}
.post-content pre::-webkit-scrollbar-track{background:transparent;}
.post-content pre::-webkit-scrollbar-thumb{background:var(--blood)44;border-radius:2px;}
.post-content hr{border:none;border-top:1px solid var(--border);margin:2rem 0;}
.post-content img{max-width:100%;border-radius:2px;border:1px solid var(--border);}
.post-content table{width:100%;border-collapse:collapse;margin:1.5rem 0;font-size:0.9rem;}
.post-content th{font-family:'Share Tech Mono',monospace;font-size:0.65rem;letter-spacing:0.15em;color:var(--blood);padding:0.6rem 1rem;border-bottom:1px solid var(--border);text-align:left;}
.post-content td{padding:0.6rem 1rem;border-bottom:1px solid rgba(255,255,255,0.04);color:var(--text2);}
.post-content tr:hover td{background:rgba(192,57,43,0.04);}

/* ── FOOTER NAV ── */
.post-footer{
  margin-top:3rem;
  padding-top:1.5rem;
  border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.back-link{
  font-family:'Share Tech Mono',monospace;font-size:0.65rem;letter-spacing:0.2em;
  color:var(--muted);text-decoration:none;display:flex;align-items:center;gap:0.5rem;
  transition:color 0.2s;
}
.back-link:hover{color:var(--blood);}
.post-sig{font-family:'Cinzel Decorative',serif;font-size:0.6rem;color:var(--dim);letter-spacing:0.2em;}

/* ── LOADING/ERROR ── */
.state-box{
  text-align:center;padding:5rem 2rem;
  font-family:'Share Tech Mono',monospace;
}
.state-icon{font-size:2.5rem;display:block;margin-bottom:1rem;animation:sg 3s ease-in-out infinite;filter:drop-shadow(0 0 15px #c0392b88);}
@keyframes sg{0%,100%{filter:drop-shadow(0 0 10px #c0392b88);}50%{filter:drop-shadow(0 0 25px #c0392bcc);}}
.state-text{font-size:0.7rem;color:var(--muted);letter-spacing:0.2em;line-height:2;}

/* ── FLAMES ── */
.flames-bottom{position:fixed;bottom:0;left:0;right:0;height:70px;z-index:5;pointer-events:none;overflow:hidden;}
.flame{position:absolute;bottom:0;border-radius:50% 50% 30% 30%;animation:flameUp var(--fd,2s) ease-out infinite;animation-delay:var(--fdel,0s);opacity:0;}
@keyframes flameUp{0%{height:0;opacity:0;}15%{opacity:0.6;}100%{height:60px;opacity:0;}}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--blood)44;border-radius:2px;}
</style>
</head>
<body>
<div class="scanlines"></div>
<div class="particles" id="particles"></div>
<div class="flames-bottom" id="flames"></div>

<nav>
  <a href="/" class="nav-logo">⚔ Shagor</a>
  <a href="/blog/" class="nav-back">← All Scrolls</a>
  <div class="nav-sep"></div>
  <div class="nav-links">
    <a href="/">Home</a>
    <a href="/blog/">Blog</a>
    <a href="/#projects">Projects</a>
  </div>
</nav>

<div class="article-wrap" id="article-wrap">
  <div class="state-box">
    <span class="state-icon">⚔</span>
    <div class="state-text">UNROLLING THE SCROLL<br><span style="opacity:0.4">please wait…</span></div>
  </div>
</div>

<script>
const API = "https://blog-api-982x.onrender.com";

// Particles
const pc=document.getElementById('particles');
for(let i=0;i<25;i++){
  const p=document.createElement('div');p.className='particle';
  p.style.left=Math.random()*100+'%';
  p.style.setProperty('--dur',(7+Math.random()*10)+'s');
  p.style.setProperty('--del',(Math.random()*12)+'s');
  p.style.setProperty('--dx',((Math.random()-0.5)*50)+'px');
  const sz=1+Math.random()*2;p.style.width=sz+'px';p.style.height=sz+'px';
  p.style.background=Math.random()>0.6?'#c0392b':'#f39c12';
  pc.appendChild(p);
}

// Flames
const fc=document.getElementById('flames');
for(let i=0;i<18;i++){
  const f=document.createElement('div');f.className='flame';
  f.style.left=Math.random()*100+'%';
  f.style.setProperty('--fd',(1.5+Math.random()*2.5)+'s');
  f.style.setProperty('--fdel',(Math.random()*4)+'s');
  const w=3+Math.random()*8;f.style.width=w+'px';
  f.style.background=Math.random()>0.5
    ?'linear-gradient(180deg,transparent,#c0392b,#e67e22)'
    :'linear-gradient(180deg,transparent,#e67e22,#f39c12)';
  fc.appendChild(f);
}

function fmtDate(d){return new Date(d).toLocaleDateString('en-GB',{day:'2-digit',month:'long',year:'numeric'});}
function wordCount(s){return s.trim()?s.trim().split(/\s+/).length:0;}
function readTime(s){return Math.max(1,Math.ceil(wordCount(s)/200));}

async function loadPost(){
  const wrap=document.getElementById('article-wrap');
  const params=new URLSearchParams(window.location.search);
  const slug=params.get('slug');

  if(!slug){
    wrap.innerHTML=`<div class="state-box"><span class="state-icon">⚠</span><div class="state-text">NO SCROLL SPECIFIED.<br><a href="/blog/" style="color:#c0392b">← Return to the archive</a></div></div>`;
    return;
  }

  try{
    const r=await fetch(`${API}/posts/${encodeURIComponent(slug)}`);
    if(!r.ok) throw new Error('not found');
    const post=await r.json();

    document.title=`${post.title} — Shadow Scroll`;

    // Configure marked
    marked.setOptions({breaks:true,gfm:true});

    const html=marked.parse(post.content||'');
    const wc=wordCount(post.content||'');
    const rt=readTime(post.content||'');

    wrap.innerHTML=`
      <div class="post-header">
        <div class="post-eyebrow">
          <span class="post-date">${fmtDate(post.created_at)}</span>
          <span class="post-badge">SCROLL</span>
        </div>
        <h1 class="post-title">${post.title}</h1>
        ${post.excerpt?`<p class="post-excerpt">${post.excerpt}</p>`:''}
        <div class="post-meta-bar">
          <div class="meta-item">WORDS: <span>${wc}</span></div>
          <div class="meta-item">READ TIME: <span>${rt} MIN</span></div>
          <div class="meta-item">INSCRIBED: <span>${fmtDate(post.updated_at||post.created_at)}</span></div>
        </div>
      </div>
      <div class="post-content">${html}</div>
      <div class="post-footer">
        <a href="/blog/" class="back-link">← Back to all scrolls</a>
        <span class="post-sig">⚔ SHADOW SCROLL</span>
      </div>
    `;
  } catch(e){
    wrap.innerHTML=`<div class="state-box"><span class="state-icon">💀</span><div class="state-text">THIS SCROLL WAS NOT FOUND.<br>IT MAY HAVE BEEN DESTROYED.<br><br><a href="/blog/" style="color:#c0392b;font-size:0.65rem;letter-spacing:0.2em">← RETURN TO THE ARCHIVE</a></div></div>`;
  }
}

loadPost();
</script>
</body>
</html>
